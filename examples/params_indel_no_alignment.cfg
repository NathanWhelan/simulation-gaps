# =============================================================================
# Simulation Parameters - No Starting Alignment with Indel Model
# =============================================================================
#
# This example shows how to run the simulation pipeline WITHOUT a starting
# alignment. Instead of splitting an empirical alignment, you specify an
# alignment_length and alisim will generate root sequences of that length.
#
# This is useful when:
#   - You don't have an empirical alignment to base simulations on
#   - You want to simulate data with insertions and deletions (indels)
#   - You want full control over the sequence length
#
# When no alignment is provided:
#   - AMAS.py is not required (no splitting step)
#   - alisim uses --length instead of -s (no site-freq/site-rate sampling)
#   - Gap introduction from empirical data is skipped
#   - Indel model introduces gaps naturally during simulation
#
# INSTRUCTIONS:
#   1. Edit the values below for your analysis.
#   2. Run: python simulate_conflict.py examples/params_indel_no_alignment.cfg
#   3. Optional: Add --dry-run to preview commands without executing them.
#
# =============================================================================

[general]
# No starting alignment - leave blank
alignment =

# Total number of sites for the root sequence (required when alignment is blank)
alignment_length = 50000

# Prefix used to name all output files
output_prefix = sim_indel_conflict

# Data type: aa (amino acid) or dna
datatype = aa

# Ratio of signal conflict (majority:minority)
ratio = 70:30

# Number of partitions to split each portion into
num_partitions = 5

# Number of CPU threads for iqtree3
threads = 10

# Path to iqtree3 executable (if not in PATH, provide full path)
iqtree = iqtree3

# Path to AMAS.py (not needed when alignment is blank)
amas = AMAS.py

# Output directory
output_dir = sim_indel_output

# Random seed base
seed_base =

# Whether to introduce empirical gap patterns (ignored when no alignment)
# With an indel model, gaps are introduced naturally during simulation.
introduce_gaps = no

# Whether to concatenate final simulated partitions
concatenate = yes

# Indel model: insertion_rate,deletion_rate
# Rates are relative to substitution rate.
# Example: 0.03,0.10 means 3 insertions and 10 deletions per 100 substitutions.
indel = 0.03,0.10

# Indel size distribution
# Options: POW{a}, GEO{q}, NB{r,q}, LAV{a,M}
# Example: POW{1.7} (power-law with exponent 1.7)
indel_size = POW{1.7}

# =============================================================================
# Tree 1: The topology that gets the MAJORITY of sites
# =============================================================================

[tree1]
file = examples/Dataset16_Choano_Uncertain_slowestHalf.tre
label = cteno-sister

# =============================================================================
# Tree 2: The topology that gets the MINORITY of sites
# =============================================================================

[tree2]
file = examples/Dataset16_Choano_Uncertain_slowestHalf_sponge-sister.tre
label = sponge-sister

# =============================================================================
# Models for each partition
# =============================================================================
#
# Format: partition_number = model, gamma_shape, seed
#

[models]
1 = WAG+C10, 1.0, 1
2 = VT+C10, 0.5, 2
3 = JTTDCMut+C10, 0.2, 3
4 = mtZOA+C10, 3.0, 4
5 = NQ.yeast+C10, 0.8, 5

# =============================================================================
# SLURM Settings (optional)
# =============================================================================

[slurm]
use_slurm = no
partition = whelan
time = 24:00:00
memory = 32GB
nodes = 1
email =
mail_type = ALL
