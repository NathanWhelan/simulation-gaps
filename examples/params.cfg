# =============================================================================
# Simulation Parameters Configuration File
# =============================================================================
#
# This file configures the alisim signal-conflict simulation pipeline.
# Lines starting with # are comments and are ignored.
#
# INSTRUCTIONS:
#   1. Copy this file and edit the values for your analysis.
#   2. Run: python simulate_conflict.py params.cfg
#   3. Optional: Add --dry-run to preview commands without executing them.
#
# =============================================================================

[general]
# Path to the input alignment file (PHYLIP or FASTA format)
# If you have a starting alignment, specify it here. The alignment will be split
# and used to sample site frequencies and rates for alisim.
# If you don't have a starting alignment, leave this blank and set alignment_length.
alignment = examples/Dataset16_Choano_Uncertain_slowestHalf.phy

# Alignment length (number of sites to simulate)
# Only used when 'alignment' is not provided. This sets the total root sequence
# length that will be divided among partitions based on the ratio.
# alignment_length = 50000

# Prefix used to name all output files
output_prefix = D16_choano_empirical-gaps_conflict

# Data type: aa (amino acid) or dna
datatype = aa

# Ratio of signal conflict (majority:minority)
# Example: 70:30 means 70%% of sites support tree1 and 30%% support tree2
ratio = 70:30

# Number of partitions to split each portion into (default: 5)
num_partitions = 5

# Number of CPU threads for iqtree3
threads = 10

# Path to iqtree3 executable (if not in PATH, provide full path)
iqtree = iqtree3

# Path to AMAS.py (if not in PATH, provide full path)
amas = AMAS.py

# Output directory (will be created if it doesn't exist)
output_dir = sim_output

# Random seed base (seeds for partitions will be derived from this)
# Leave blank to use seeds specified per-model below
seed_base =

# Whether to introduce gaps from the empirical alignment into simulated data
# Options: yes, no
introduce_gaps = yes

# Method for introducing gaps when alignments differ in length
# Options: direct, proportional
gap_method = direct

# Indel model for alisim (optional)
# Format: insertion_rate,deletion_rate
# Rates are relative to the substitution rate.
# Example: 0.03,0.10 means 3 insertions and 10 deletions per 100 substitutions.
# Leave blank to disable indel simulation.
# See: https://iqtree.github.io/doc/AliSim
indel =

# Indel size distribution (optional, used with indel model)
# Specifies the distribution of indel lengths.
# Options:
#   POW{a}         - Power-law distribution with exponent a
#   GEO{q}         - Geometric distribution with parameter q
#   NB{r,q}        - Negative binomial with parameters r and q
#   LAV{a,M}       - Lavalette distribution with parameters a and M
# Example: POW{1.7}
# Leave blank to use iqtree3 default.
indel_size =

# Whether to concatenate final simulated partitions
# Options: yes, no
concatenate = yes

# =============================================================================
# Tree 1: The topology that gets the MAJORITY of sites (first number in ratio)
# =============================================================================

[tree1]
# Path to the tree file in Newick format
file = examples/Dataset16_Choano_Uncertain_slowestHalf.tre

# Short label for this topology (used in output filenames)
# Keep it short, no spaces. Examples: cteno-sister, sponge-sister, hypothesis-A
label = cteno-sister

# =============================================================================
# Tree 2: The topology that gets the MINORITY of sites (second number in ratio)
# =============================================================================

[tree2]
# Path to the tree file in Newick format
file = examples/Dataset16_Choano_Uncertain_slowestHalf_sponge-sister.tre

# Short label for this topology (used in output filenames)
label = sponge-sister

# =============================================================================
# Models for each partition
# =============================================================================
#
# Specify the substitution model for each partition number.
# Format:  partition_number = model, gamma_shape, seed
#
# - model: The substitution model (e.g., WAG+C10, VT+C10, JTTDCMut+C10)
# - gamma_shape: The alpha parameter for the gamma rate distribution
# - seed: Random seed for alisim (for reproducibility)
#
# The SAME models are used for both tree1 and tree2 partitions.
# You must specify exactly as many models as num_partitions above.
#
# Common amino acid models: WAG, LG, JTT, JTTDCMut, VT, mtZOA, NQ.yeast,
#                           Dayhoff, DCMut, cpREV, mtREV, rtREV, PMB
#
# Mixture models: Append +C10, +C20, +C30, +C40, +C50, +C60
#                 (C-series profile mixture models)
#
# =============================================================================

[models]
1 = WAG+C10, 1.0, 1
2 = VT+C10, 0.5, 2
3 = JTTDCMut+C10, 0.2, 2
4 = mtZOA+C10, 3.0, 4
5 = NQ.yeast+C10, 0.8, 6

# =============================================================================
# SLURM Settings (optional - only needed if running on a cluster)
# =============================================================================
#
# If use_slurm = yes, the script will generate SLURM batch scripts instead
# of running iqtree3 directly.
#
# =============================================================================

[slurm]
# Whether to generate SLURM scripts instead of running directly
# Options: yes, no
use_slurm = no

# SLURM partition name
partition = whelan

# Wall time limit (HH:MM:SS)
time = 24:00:00

# Memory allocation
memory = 32GB

# Number of nodes
nodes = 1

# Email for job notifications (leave blank to disable)
email =

# Email notification type: ALL, BEGIN, END, FAIL, NONE
mail_type = ALL
